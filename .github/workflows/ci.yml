name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up GHCup
        uses: haskell/ghcup-setup@v1
        with:
          ghc: "9.14.1"
          cabal: "3.16.0.0"

      - name: Update package index
        run: cabal update

      - name: Build libraries
        run: cabal build all

      - name: Run test suite
        run: cabal test cob-tests
